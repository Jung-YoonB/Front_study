<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>새싹의 게임 라이브러리</title>

    <!-- Gamja Flower, Single Day 폰트 적용 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gamja+Flower&family=Single+Day&display=swap" rel="stylesheet">

    <!-- CSS 파일 연결 -->
    <link rel="stylesheet" href="styles/26-07-22_7월4주차과제_배정윤_style.css">

</head>
<body>
    <!-- 페이지 제목 -->
    <header>
        <img src="https://img.notionusercontent.com/s3/prod-files-secure-apne2%2F769aad28-85c4-811b-b645-0003fe399775%2F97413339-5b49-4ee1-8a6c-be8bceceda63%2Fda2.jpg/size/w=2000?exp=1784869377&sig=hehLf6J-Ql-QgWQ-M91LbIQUj4AC6lwjca_0ImvVqjs&imgBuildSrc=presignImageUrl&id=3a5aad28-85c4-8079-a01a-e7d8fcf83e44&table=block&mtd=com" alt="새싹 이미지">
        <h1>새싹의 게임 라이브러리</h1>
    </header>

    <!-- 게임 소개 카드 -->
    <main>
        <div class="cards">
            <!-- 게임 1 -->
            <label class="card">
                <input type="checkbox" class="checked">
                <h3 class="game-name">Stardew Valley</h3>
                <div class="description">
                <p class="game-info">
                    <strong>스타듀 밸리</strong>
                    <br>
                    <br>
                    농사 낚시 연애 광질... 
                    <br>
                    느긋한(?) 생활 농장 시뮬
                    <br>
                    세바스찬은 구해 줘야해...
                    <br>
                    <br>
                    아무 생각 없이 단순 노동!
                    <br>
                    그저 즐기고 싶다!
                    <br>
                    혼자서, 또는 친구와 함께...
                    <br>
                    귀농, 하시렵니까?
                </p>
                <a href="https://ko.stardewvalleywiki.com/Stardew_Valley_Wiki" class="game-links">연관 Wiki 바로가기</a>
                </div>
            </label>

            <!-- 게임 2 -->
            <label class="card">
                <input type="checkbox" class="checked">
                <h3 class="game-name">Pokémon Pokopia</h3>
                <div class="description">
                <p class="game-info">
                    <strong>포코피아</strong>
                    <br>
                    <br>
                    포코아 포켓몬 ♪(´▽｀) 
                    <br>
                    메타몽~ 메타메타 메타몽?
                    <br>
                    귀여운 메타몽이 되어보자.
                    <br>
                    <br>
                    포켓몬 친구들을 돕거나
                    <br>
                    부려먹으며(?)
                    <br>
                    마을을 재건하는 힐링타임!
                    <br>
                    인간아, 도라와...!(;´༎ຶД༎ຶ`)
                </p>
                <a href="https://pokopiaguide.com/ko" class="game-links">연관 Wiki 바로가기</a>
                </div>
            </label>

            <!-- 게임 3 -->
            <label class="card">
                <input type="checkbox" class="checked">
                <h3 class="game-name">FINAL FANTASY XVI</h3>
                <div class="description">
                <p class="game-info">
                    <strong>파이널 판타지 16</strong>
                    <br>
                    <br>
                    파이널 판타지 시리즈
                    <br>
                    가장 최근 16번째 작품
                    <br>
                    무려 19금 딱지도 붙은...
                    <br>
                    <br>
                    왕좌의 게임을 JRPG 감성으로
                    <br>
                    우리 조슈아.........
                    <br>
                    조.....슈아...........
                    <br>
                    조슈아!!!!!!!!!!!!!!!!
                </p>
                <a href="https://finalfantasy.fandom.com/wiki/Final_Fantasy_XVI" class="game-links">연관 Wiki 바로가기</a>
                </div>
            </label>

            <!-- 게임 4 -->
            <label class="card">
                <input type="checkbox" class="checked">
                <h3 class="game-name">Don't Starve Together</h3>
                <div class="description">
                <p class="game-info">
                    <strong>다함께 굶지마!</strong>
                    <br>
                    <br>
                    말 그대로 굶지마!
                    <br>
                    배고파도, 더워도, 추워도,
                    <br>
                    어두워도 사망사망사망사망
                    <br>
                    <br>
                    친구들과 함께
                    <br>
                    이상한 그림자 세계를
                    <br>
                    노동을 하며(?)
                    <br>
                    살아남아보자.
                </p>
                <a href="https://dontstarve.fandom.com/wiki/Don%27t_Starve_Together" class="game-links">연관 Wiki 바로가기</a>
                </div>
            </label>

            <!-- 게임 5 -->
            <label class="card">
                <input type="checkbox" class="checked">
                <h3 class="game-name">NieR:Automata</h3>
                <div class="description">
                <p class="game-info">
                    <strong>니어:오토마타</strong>
                    <br>
                    <br>
                    니어: 엉덩... 아닙니다.
                    <br>
                    엉덩이를 보고 울고
                    <br>
                    엔딩을 보고 울고
                    <br>
                    <br>
                    엔딩을 거듭할수록
                    <br>
                    우린.....안될거야...
                    <br>
                    연출과 반전이 가득한
                    <br>
                    엉덩, 아니 오토마타!
                </p>
                <a href="https://nier.fandom.com/wiki/NieR:Automata" class="game-links">연관 Wiki 바로가기</a>
                </div>
            </label>

            <!-- 게임 6 -->
            <label class="card">
                <input type="checkbox" class="checked">
                <h3 class="game-name">농부는 대체되었다</h3>
                <div class="description">
                <p class="game-info">
                    <strong>농부는 대체되었다</strong>
                    <br>
                    <br>
                    대 AI시대
                    <br>
                    AI 대신 드론입니다.
                    <br>
                    코딩을 코딩코딩 곁들여서요.
                    <br>
                    <br>
                    드론을 코딩해 농사를 짓자.
                    <br>
                    호박 캐기를 넘어선 자...
                    <br>
                    코딩의 기초를 넘어선 것...
                    <br>
                    사실 저도 아직 안해봤어요.
                    <br>
                    찜 목록에 그저 저장 ★
                </p>
                <a href="https://namu.wiki/w/%3C%EB%86%8D%EB%B6%80%EB%8A%94%20%EB%8C%80%EC%B2%B4%EB%90%98%EC%97%88%EB%8B%A4()_" class="game-links">연관 Wiki 바로가기</a>
                </div>
            </label>

            <!-- 게임 7 -->
            <label class="card">
                <input type="checkbox" class="checked">
                <h3 class="game-name">Devil May Cry 5</h3>
                <div class="description">
                <p class="game-info">
                    <strong>데빌 메이 크라이 5</strong>
                    <br>
                    <br>
                    돌아온 단테!
                    <br>
                    그렇다. 죽지 않고...
                    <br>
                    또또또 돌아왔다.
                    <br>
                    <br>
                    그렇게 한 아낙네의
                    <br>
                    심장에 하트를 팍 꽂아버리신..
                    <br>
                    ??? : 아저씨는 처음이야(?)
                    <br>
                    아저씨의 매력에 빠져보시죠.
                </p>
                <a href="https://devilmaycry.fandom.com/wiki/Devil_May_Cry_5" class="game-links">연관 Wiki 바로가기</a>
                </div>
            </label>

            <!-- 게임 8 -->
            <label class="card">
                <input type="checkbox" class="checked">
                <h3 class="game-name">Metaphor: ReFantazio</h3>
                <div class="description">
                <p class="game-info">
                    <strong>메타포: 리판타지오</strong>
                    <br>
                    <br>
                    여신전쟁 시리즈
                    <br>
                    페르소나 시리즈
                    <br>
                    두개를 조물조물 맛있게
                    <br>
                    <br>
                    아틀러스의 신규 IP
                    <br>
                    전통의 시리즈 두개를
                    <br>
                    장점만 골라 맛있게 버무린
                    <br>
                    우리 왕자님 귀엽쬬?
                </p>
                <a href="https://megamitensei.fandom.com/wiki/Metaphor:_ReFantazio" class="game-links">연관 Wiki 바로가기</a>
                </div>
            </label>            
        </div>
    </main>

    <!-- 게임구매 플랫폼 링크 -->
    <footer>
        <ul>
            <li><a href="https://store.steampowered.com/" class="shop-links">Steam</a></li>
            <li><a href="https://www.nintendo.com/kr/software/switch" class="shop-links">Nintendo</a></li>
            <li><a href="https://store.playstation.com/ko-kr/pages/latest" class="shop-links">Playstation</a></li>
            <li><a href="https://play.google.com/store/games" class="shop-links">Google Play</a></li>
            <li class="last-link"><a href="https://www.apple.com/kr/app-store/" class="shop-links">App Store</a></li>
        </ul>
    </footer>
</body>
</html>
