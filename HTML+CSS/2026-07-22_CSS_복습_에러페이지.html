<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>

    <style>
        * {font-family: 'Courier New', Courier, monospace; text-align: center; line-height: 1.5;
            background-color: #0000aa; color: white;
            margin: 0;}

        body {height: 100vh;
            display: flex;
            justify-content: center; align-items: center;}

            div>h1 {font-size: 100px;}
        
            div>p {margin-top: 10px;}

            div>a {color: #ffff55;
            text-decoration: none;
            display: inline-block;
            margin-top: 15px;}

                div>a:hover {text-decoration: underline;}

    </style>
</head>
<body>
    <div>    
        <h1>404</h1>
        <h2>페이지를 찾을 수 없습니다!</h2>
        <p>
            요청하신 페이지가 존재하지 않거나, 주소가 잘못 입력되었습니다.
            <br>
            다시 시도하거나 홈으로 이동해주세요.
        </p>
        <a href="#" class="f-ffff55">홈으로 돌아가기</a>
    </div>
</body>
</html>
